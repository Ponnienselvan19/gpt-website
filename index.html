<script>
  const menu = {
    // your menu stays same
  };

  const allItems = [...menu.pizzas, ...menu.sides, ...menu.drinks];
  const selectedQuantities = {};
  let cart = [];
  let orderType = "delivery";

  const fallbackImage = "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500'><rect width='800' height='500' fill='%23fbfcf7'/><rect x='40' y='40' width='720' height='420' rx='28' fill='%23ffffff' stroke='%23e4ead8' stroke-width='6'/><text x='400' y='230' text-anchor='middle' font-family='Arial, sans-serif' font-size='34' fill='%23485843'>Image unavailable</text><text x='400' y='275' text-anchor='middle' font-family='Arial, sans-serif' font-size='22' fill='%23798572'>Please refresh or change the image</text></svg>";

  function showPage(page) {
    document.querySelectorAll(".page").forEach(el => el.classList.remove("active"));
    const nextPage = document.getElementById(page);
    if (nextPage) nextPage.classList.add("active");

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.classList.toggle("active", btn.dataset.page === page);
    });

    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      showPage(btn.dataset.page);
    });
  });

  function setOrderType(type) {
    orderType = type;
    document.getElementById("deliveryBtn").classList.toggle("active", type === "delivery");
    document.getElementById("pickupBtn").classList.toggle("active", type === "pickup");
    document.getElementById("checkout-address").style.display = type === "delivery" ? "block" : "none";
    renderBasket();
  }

  function updateSelectedQty(id, delta) {
    selectedQuantities[id] = Math.max(1, (selectedQuantities[id] || 1) + delta);
    renderAllMenus();
  }

  function addToCart(id) {
    const item = allItems.find(i => i.id === id);
    const qty = selectedQuantities[id] || 1;
    const existing = cart.find(i => i.id === id);

    if (existing) {
      existing.qty += qty;
    } else {
      cart.push({ ...item, qty });
    }

    selectedQuantities[id] = 1;
    renderAllMenus();
    renderBasket();
    showPage("checkout");
  }

  function updateCartQty(id, delta) {
    cart = cart
      .map(item => item.id === id ? { ...item, qty: Math.max(0, item.qty + delta) } : item)
      .filter(item => item.qty > 0);
    renderBasket();
  }

  function renderCard(item) {
    const qty = selectedQuantities[item.id] || 1;

    return `
      <div class="menu-card">
        <div class="menu-image">
          <img src="${item.image}" alt="${item.name}" onerror="this.onerror=null;this.src='${fallbackImage}'">
        </div>
        <div class="menu-content">
          <div>
            ${item.badge ? `<span class="badge">${item.badge}</span>` : ""}
            <h4>${item.name}</h4>
            <p>${item.desc}</p>
          </div>
          <div class="menu-bottom">
            <div class="price">£${item.price.toFixed(2)}</div>
            <div class="qty-wrap">
              <div class="qty-control">
                <button type="button" onclick="updateSelectedQty(${item.id}, -1)">−</button>
                <span>${qty}</span>
                <button type="button" onclick="updateSelectedQty(${item.id}, 1)">+</button>
              </div>
              <button type="button" class="mini-add-btn" onclick="addToCart(${item.id})">Add</button>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function renderAllMenus() {
    document.getElementById("pizza-grid").innerHTML = menu.pizzas.map(renderCard).join("");
    document.getElementById("sides-grid").innerHTML = menu.sides.map(renderCard).join("");
    document.getElementById("drinks-grid").innerHTML = menu.drinks.map(renderCard).join("");
  }

  function renderBasket() {
    const wrap = document.getElementById("basket-content");

    if (!cart.length) {
      wrap.innerHTML = `
        <p>Your basket is empty. Choose from our premium menu to begin your order.</p>
        <div class="basket-empty-buttons">
          ${allItems.slice(0,3).map(item => `
            <button type="button" onclick="addToCart(${item.id})">
              <div style="font-weight:600;">${item.name}</div>
              <div style="font-size:0.9rem; color:#798572; margin-top:4px;">£${item.price.toFixed(2)}</div>
            </button>
          `).join("")}
        </div>
      `;
      return;
    }

    const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
    const deliveryFee = orderType === "delivery" ? 3.99 : 0;
    const total = subtotal + deliveryFee;

    wrap.innerHTML = `
      <div>
        ${cart.map(item => `
          <div class="summary-item">
            <div>
              <h4>${item.name}</h4>
              <small>£${item.price.toFixed(2)} each</small>
            </div>
            <div class="summary-item-right">
              <div style="font-weight:700; color:#485843;">£${(item.price * item.qty).toFixed(2)}</div>
              <div class="summary-qty">
                <button type="button" onclick="updateCartQty(${item.id}, -1)">−</button>
                <span>${item.qty}</span>
                <button type="button" onclick="updateCartQty(${item.id}, 1)">+</button>
              </div>
            </div>
          </div>
        `).join("")}

        <div class="summary-total">
          <div class="row">
            <span>Subtotal</span>
            <span>£${subtotal.toFixed(2)}</span>
          </div>
          <div class="row">
            <span>${orderType === "delivery" ? "Delivery fee" : "Pickup"}</span>
            <span>${orderType === "delivery" ? `£${deliveryFee.toFixed(2)}` : "Free"}</span>
          </div>
          <div class="row grand">
            <span>Total</span>
            <span>£${total.toFixed(2)}</span>
          </div>
        </div>
      </div>
    `;
  }

  renderAllMenus();
  renderBasket();
  setOrderType("delivery");
</script>
